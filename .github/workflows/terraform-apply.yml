name: Terraform Apply

on:
  workflow_run:
    workflows:
      - Terraform Plan
    types:
      - completed
    branches:
      - main



env:
  AWS_ACCOUNT_ID: "161486985462"
  AWS_ACCOUNT_NAME: "cybersecurity1st"
  AWS_ROLE_ARN: "arn:aws:iam::161486985462:role/aws-ai-watchman-dev-github-actions-deploy"
  AWS_REGION: "us-east-1"
  TF_IN_AUTOMATION: "true"

jobs:
  apply:
    name: Terraform Apply
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment: aws-deploy
    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4.0.2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Confirm target account
        run: aws sts get-caller-identity

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform apply
        run: terraform apply -input=false -auto-approve -var="aws_region=${AWS_REGION}" -var="environment=dev" -var="github_repository=${GITHUB_REPOSITORY}"
